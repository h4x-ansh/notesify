# Render Blueprint for the hosted API (see Dockerfile). Deploys server.js
# only - the frontend/ and electron/ trees are excluded via .dockerignore
# and aren't part of this service.
#
# Secrets (GEMINI_API_KEY, GROQ_API_KEY, OPENAI_API_KEY, API_SHARED_SECRET,
# YT_COOKIES_BASE64) are intentionally left as `sync: false` - Render will
# prompt for their values in the dashboard on first deploy rather than
# reading them from this committed file.
services:
  - type: web
    name: notesify-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # Third step of the notes-generation fallback chain (gemini-2.5-flash
      # -> gemini-2.5-flash-lite -> Groq), only reached once both Gemini
      # quotas are exhausted (see src/notesGenerator.js). Free key at
      # console.groq.com/keys - the free tier's daily Gemini cap is hit
      # often enough on this project's own hosted testing that this isn't
      # just a theoretical fallback.
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Required on /generate, /status/:jobId, /download/:jobId via
      # X-API-Secret header (see requireApiSecret in server.js). Left unset
      # locally/in Electron on purpose - only Render needs this filled in.
      - key: API_SHARED_SECRET
        sync: false
      # Base64-encoded Netscape cookies.txt (browser-exported, logged-in
      # YouTube session) - works around the caption-fetch/yt-dlp blocking
      # investigated in the "Hosted API" section below. Decoded to a temp
      # file at startup by src/transcript.js; harmless if left unset.
      - key: YT_COOKIES_BASE64
        sync: false
      - key: JOBS_OUTPUT_DIR
        value: /app/output/jobs
